# MCP connector registry — add servers here; SAG spawns each as a stdio child process.
# Gmail auth: data/gmail-mcp/gcp-oauth.keys.json then npm run mcp:gmail-auth
# Calendar auth: same OAuth keys file, enable Calendar API, then npm run mcp:calendar-auth

servers:
  gmail:
    enabled: true
    command: node
    args: ["{ROOT}/node_modules/@gongrzhe/server-gmail-autoauth-mcp/dist/index.js"]
    tool_prefix: gmail
    # Read-only to start; remove or expand when send/label tools are trusted.
    allowed_tools:
      - search_emails
      - read_email
      - list_email_labels

  calendar:
    enabled: true
    command: node
    args: ["{ROOT}/node_modules/@cocal/google-calendar-mcp/build/index.js"]
    tool_prefix: calendar
    env:
      GOOGLE_OAUTH_CREDENTIALS: "{ROOT}/data/calendar-mcp/gcp-oauth.keys.json"
    # Read-only — expand when create/update/delete are trusted.
    allowed_tools:
      - list-calendars
      - list-events
      - search-events
      - get-event
      - get-freebusy
      - get-current-time
